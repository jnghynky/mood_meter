<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>무드 미터 · 우리 반 마음 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --yellow:#FFC93C; --yellow-soft:#FFEDB0; --yellow-deep:#E89A00;
    --red:#FF7B6B; --red-soft:#FFD2CB; --red-deep:#D94A39;
    --blue:#5DA9E9; --blue-soft:#C6E2F8; --blue-deep:#2F7FCB;
    --green:#56C58A; --green-soft:#C2EBD4; --green-deep:#2E9A63;
    --ink:#39394a; --ink-soft:#6c6c80; --cream:#FFF7EC; --panel:#FFFFFF;
    --shadow:0 10px 30px rgba(70,60,90,.14); --shadow-lg:0 20px 46px rgba(70,60,90,.20);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Jua',sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 500px at 10% -8%, #FFE2A833, transparent 60%),
      radial-gradient(800px 520px at 96% 0%, #BFE3F933, transparent 60%),
      radial-gradient(700px 600px at 50% 120%, #C7EBD533, transparent 55%),
      var(--cream);
    min-height:100%;padding:18px 20px 30px;overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(120,110,140,.07) 1px, transparent 1.4px);background-size:22px 22px;opacity:.5;}
  .wrap{position:relative;z-index:1;max-width:1220px;margin:0 auto;}

  header{text-align:center;margin-bottom:14px;}
  .title{font-size:clamp(30px,5vw,48px);line-height:1;letter-spacing:1px;display:inline-block;}
  .title .a{color:var(--red);}.title .b{color:var(--yellow-deep);}
  .title .c{color:var(--blue);}.title .d{color:var(--green);}
  .sub{font-family:'Gaegu',cursive;font-weight:700;font-size:clamp(15px,2.6vw,19px);color:var(--ink-soft);margin-top:6px;}

  /* two-column landscape layout */
  .app{display:grid;grid-template-columns:1.7fr 1fr;gap:20px;align-items:start;}

  .meter-area{display:grid;grid-template-columns:24px 1fr;grid-template-rows:1fr 24px;
    grid-template-areas:"yaxis meter" ". xaxis";gap:7px;}
  .yaxis{grid-area:yaxis;display:flex;flex-direction:column;}
  .yaxis span{flex:1;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;transform:rotate(180deg);
    font-family:'Gaegu',cursive;font-weight:700;font-size:13px;color:var(--ink-soft);white-space:nowrap;}
  .xaxis{grid-area:xaxis;display:flex;}
  .xaxis span{flex:1;text-align:center;font-family:'Gaegu',cursive;font-weight:700;font-size:13px;color:var(--ink-soft);}

  .meter{grid-area:meter;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .quad{border-radius:24px;padding:12px 11px;box-shadow:var(--shadow);position:relative;overflow:hidden;
    animation:pop .5s cubic-bezier(.2,.9,.3,1.3) both;}
  .quad::after{content:"";position:absolute;inset:0;border-radius:24px;
    background:linear-gradient(160deg,rgba(255,255,255,.45),rgba(255,255,255,0) 45%);pointer-events:none;}
  .quad.red{background:var(--red-soft);animation-delay:.02s;}
  .quad.yellow{background:var(--yellow-soft);animation-delay:.10s;}
  .quad.blue{background:var(--blue-soft);animation-delay:.18s;}
  .quad.green{background:var(--green-soft);animation-delay:.26s;}
  .quad-name{font-size:16px;margin:1px 4px 9px;display:flex;align-items:center;gap:6px;}
  .quad.red .quad-name{color:var(--red-deep);}.quad.yellow .quad-name{color:var(--yellow-deep);}
  .quad.blue .quad-name{color:var(--blue-deep);}.quad.green .quad-name{color:var(--green-deep);}
  .quad-name .dot{width:12px;height:12px;border-radius:50%;}
  .quad.red .dot{background:var(--red);}.quad.yellow .dot{background:var(--yellow);}
  .quad.blue .dot{background:var(--blue);}.quad.green .dot{background:var(--green);}

  .cells{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;position:relative;z-index:1;}
  .cell{border:none;cursor:pointer;background:rgba(255,255,255,.72);border-radius:15px;padding:8px 3px 6px;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    transition:transform .15s ease, box-shadow .15s ease, background .15s;box-shadow:0 3px 7px rgba(80,70,100,.08);}
  .cell svg{width:40px;height:40px;display:block;filter:drop-shadow(0 2px 2px rgba(80,60,90,.12));}
  .cell .lbl{font-size:13.5px;color:var(--ink);text-align:center;line-height:1.05;word-break:keep-all;}
  .cell:hover{transform:translateY(-3px) scale(1.06);background:#fff;box-shadow:0 9px 16px rgba(80,70,100,.18);z-index:3;}
  .cell:active{transform:scale(.99);}
  .cell.sel{background:#fff;transform:translateY(-2px) scale(1.07);z-index:4;
    box-shadow:0 0 0 3px #fff,0 0 0 6px currentColor,0 10px 20px rgba(80,70,100,.22);}
  .quad.red .cell.sel{color:var(--red);}.quad.yellow .cell.sel{color:var(--yellow-deep);}
  .quad.blue .cell.sel{color:var(--blue);}.quad.green .cell.sel{color:var(--green);}

  /* side panel */
  .side{position:sticky;top:14px;display:flex;flex-direction:column;gap:16px;}
  .response{border-radius:26px;background:var(--panel);box-shadow:var(--shadow-lg);padding:22px 20px;
    text-align:center;border:3px solid #eee;opacity:0;transform:translateY(12px) scale(.98);}
  .response.show{animation:rise .45s cubic-bezier(.2,.9,.3,1.3) forwards;}
  .response .bigface svg{width:120px;height:120px;filter:drop-shadow(0 5px 7px rgba(80,60,90,.16));}
  .response .feeling{font-size:clamp(24px,3.4vw,30px);line-height:1.15;margin:8px 0 12px;}
  .response .sit,.response .tip{font-family:'Gaegu',cursive;font-weight:700;text-align:left;line-height:1.45;
    border-radius:14px;padding:10px 13px;display:flex;gap:8px;align-items:flex-start;}
  .response .sit{font-size:17px;color:var(--ink);background:#FFF6E2;margin-bottom:9px;}
  .response .tip{font-size:16px;color:var(--ink-soft);background:#F4F0FA;}
  .placeholder{border-radius:26px;border:3px dashed #E0D8E8;padding:40px 22px;text-align:center;color:var(--ink-soft);
    font-family:'Gaegu',cursive;font-weight:700;font-size:18px;background:rgba(255,255,255,.5);line-height:1.5;}
  .placeholder .em{font-size:34px;display:block;margin-bottom:8px;}

  .collect{background:rgba(255,255,255,.55);border-radius:22px;padding:14px 16px;}
  .collect-title{font-family:'Gaegu',cursive;font-weight:700;font-size:15px;color:var(--ink-soft);
    margin:0 2px 9px;display:flex;align-items:center;justify-content:space-between;}
  .clear{font-family:'Gaegu',cursive;font-weight:700;font-size:13px;color:var(--ink-soft);
    background:#fff;border:2px solid #EDE6F2;border-radius:999px;padding:4px 11px;cursor:pointer;}
  .clear:hover{background:#F7F2FB;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;min-height:38px;align-items:center;}
  .chip{display:flex;align-items:center;gap:5px;background:#fff;border-radius:999px;padding:4px 11px 4px 5px;
    box-shadow:0 3px 7px rgba(80,70,100,.1);font-size:14px;animation:pop .35s cubic-bezier(.2,.9,.3,1.3) both;}
  .chip svg{width:24px;height:24px;}
  .chips .empty{font-family:'Gaegu',cursive;font-weight:700;color:#B9B2C4;font-size:14px;}

  footer{margin-top:18px;text-align:center;font-family:'Gaegu',cursive;color:#B0A8BC;font-size:13px;}
  @keyframes pop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
  @keyframes rise{to{opacity:1;transform:translateY(0) scale(1);}}

  @media (max-width:880px){
    .app{grid-template-columns:1fr;}
    .side{position:static;}
    .response .bigface svg{width:96px;height:96px;}
  }
  @media (max-width:480px){ .cell svg{width:36px;height:36px;} .cell .lbl{font-size:12.5px;} }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="title"><span class="a">무</span><span class="b">드</span> <span class="c">미</span><span class="d">터</span></h1>
      <p class="sub">지금 내 마음과 가장 비슷한 표정을 콕! 눌러봐 🎨</p>
    </header>

    <div class="app">
      <div class="meter-area">
        <div class="yaxis"><span>⚡ 기운이 솟아요</span><span>🌙 기운이 차분해요</span></div>
        <div class="meter" id="meter"></div>
        <div class="xaxis"><span>← 기분이 별로예요</span><span>기분이 좋아요 →</span></div>
      </div>

      <div class="side">
        <div id="slot">
          <div class="placeholder"><span class="em">😄😠😢😌</span>오늘 너의 마음과 가장 비슷한 표정을 골라봐!<br/>표정·상황·다독임이 여기에 나와요.</div>
        </div>
        <div class="collect">
          <div class="collect-title"><span>🌈 오늘 내가 모은 마음</span><button class="clear" id="clearBtn">싹 지우기</button></div>
          <div class="chips" id="chips"><span class="empty">아직 고른 마음이 없어요</span></div>
        </div>
      </div>
    </div>

    <footer>좋은 마음도, 힘든 마음도 모두 소중해요. 어떤 마음이든 느껴도 괜찮아 💛</footer>
  </div>

<script>
function eyes(t){const L=28,R=52,Y=34;switch(t){
  case'happy':return `<path d="M${L-7} ${Y+2} Q${L} ${Y-7} ${L+7} ${Y+2}"/><path d="M${R-7} ${Y+2} Q${R} ${Y-7} ${R+7} ${Y+2}"/>`;
  case'wide':return `<circle cx="${L}" cy="${Y}" r="6.4" fill="#fff" stroke-width="2.4"/><circle cx="${R}" cy="${Y}" r="6.4" fill="#fff" stroke-width="2.4"/><circle cx="${L}" cy="${Y+1}" r="3" fill="#39394a" stroke="none"/><circle cx="${R}" cy="${Y+1}" r="3" fill="#39394a" stroke="none"/>`;
  case'star':return `<g>${star(L,Y)}${star(R,Y)}</g>`;
  case'sleepy':return `<path d="M${L-6} ${Y} Q${L} ${Y+4} ${L+6} ${Y}"/><path d="M${R-6} ${Y} Q${R} ${Y+4} ${R+6} ${Y}"/>`;
  case'sad':return `<path d="M${L-6} ${Y+3} Q${L} ${Y-3} ${L+6} ${Y+1}"/><path d="M${R-6} ${Y+1} Q${R} ${Y-3} ${R+6} ${Y+3}"/>`;
  case'angry':return `<path d="M${L-7} ${Y-4} L${L+6} ${Y+1}"/><path d="M${R+7} ${Y-4} L${R-6} ${Y+1}"/><circle cx="${L+1}" cy="${Y+4}" r="3" stroke="none" fill="#39394a"/><circle cx="${R-1}" cy="${Y+4}" r="3" stroke="none" fill="#39394a"/>`;
  case'worry':return `<circle cx="${L}" cy="${Y+1}" r="4.6" fill="#fff" stroke-width="2.2"/><circle cx="${R}" cy="${Y+1}" r="4.6" fill="#fff" stroke-width="2.2"/><circle cx="${L}" cy="${Y+2}" r="2.3" stroke="none" fill="#39394a"/><circle cx="${R}" cy="${Y+2}" r="2.3" stroke="none" fill="#39394a"/><path d="M${L-7} ${Y-7} Q${L} ${Y-10} ${L+6} ${Y-7}"/><path d="M${R-6} ${Y-7} Q${R} ${Y-10} ${R+7} ${Y-7}"/>`;
  default:return `<circle cx="${L}" cy="${Y}" r="3.4"/><circle cx="${R}" cy="${Y}" r="3.4"/>`;}}
function star(x,y){return `<path d="M${x} ${y-7} L${x+2} ${y-2} L${x+7} ${y-1} L${x+3} ${y+2} L${x+4} ${y+7} L${x} ${y+4} L${x-4} ${y+7} L${x-3} ${y+2} L${x-7} ${y-1} L${x-2} ${y-2} Z" fill="#FFD23C" stroke="#E89A00" stroke-width="1.4" stroke-linejoin="round"/>`;}
function mouth(t){switch(t){
  case'bigSmile':return `<path d="M26 50 Q40 68 54 50 Q40 60 26 50 Z" fill="#fff" stroke-width="2.6"/>`;
  case'smile':return `<path d="M30 52 Q40 62 50 52" fill="none" stroke-width="3"/>`;
  case'grin':return `<path d="M29 51 Q40 60 51 51" fill="none" stroke-width="3"/><line x1="40" y1="51" x2="40" y2="57"/>`;
  case'neutral':return `<line x1="33" y1="55" x2="47" y2="55" stroke-width="3"/>`;
  case'frown':return `<path d="M31 58 Q40 50 49 58" fill="none" stroke-width="3"/>`;
  case'open':return `<ellipse cx="40" cy="55" rx="7" ry="9" fill="#fff" stroke-width="2.6"/>`;
  case'wavy':return `<path d="M26 55 Q30 51 34 55 T42 55 T50 55" fill="none" stroke-width="2.8"/>`;
  case'small':return `<circle cx="40" cy="55" r="3.2" fill="#fff" stroke-width="2.4"/>`;
  default:return `<path d="M31 53 Q40 60 49 53" fill="none" stroke-width="3"/>`;}}
function extra(list){let s='';(list||[]).forEach(e=>{
  if(e==='tear')s+=`<path d="M50 38 q-3 6 0 10 q3 -4 0 -10 Z" fill="#5DA9E9" stroke="#2F7FCB" stroke-width="1.2"/>`;
  if(e==='sweat')s+=`<path d="M60 24 q-3 6 0 9 q3 -3 0 -9 Z" fill="#7FC4F5" stroke="#2F7FCB" stroke-width="1.2"/>`;
  if(e==='sparkle')s+=`<g stroke="none" fill="#FFD23C">${spk(13,18,3.5)}${spk(67,20,3)}${spk(70,52,2.6)}</g>`;
  if(e==='anger')s+=`<path d="M58 16 l6 0 l-3 5 l5 0 l-7 8 l2 -6 l-5 0 Z" fill="#FF4D4D" stroke="none"/>`;
  if(e==='blush')s+=`<ellipse cx="20" cy="46" rx="6" ry="3.6" fill="#FF9AA8" opacity=".75" stroke="none"/><ellipse cx="60" cy="46" rx="6" ry="3.6" fill="#FF9AA8" opacity=".75" stroke="none"/>`;
  if(e==='zzz')s+=`<text x="58" y="22" font-family="Jua" font-size="11" fill="#9aa" stroke="none">z</text><text x="65" y="15" font-family="Jua" font-size="8" fill="#9aa" stroke="none">z</text>`;
  if(e==='heart')s+=`<path d="M64 30 q3 -5 6 0 q3 -5 6 0 q0 5 -6 9 q-6 -4 -6 -9 Z" fill="#FF7B8E" stroke="none" transform="scale(.7) translate(20,8)"/>`;});return s;}
function spk(x,y,r){return `<path d="M${x} ${y-r*2} L${x+r*0.5} ${y-r*0.5} L${x+r*2} ${y} L${x+r*0.5} ${y+r*0.5} L${x} ${y+r*2} L${x-r*0.5} ${y+r*0.5} L${x-r*2} ${y} L${x-r*0.5} ${y-r*0.5} Z"/>`;}
function face(c){return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <circle cx="40" cy="40" r="34" fill="${c.fill}" stroke="${c.ring}" stroke-width="3.5"/>
  <g stroke="#39394a" stroke-width="3" stroke-linecap="round" fill="#39394a">${eyes(c.eyes)}</g>
  <g stroke="#39394a" stroke-linecap="round" stroke-linejoin="round" fill="none">${mouth(c.mouth)}</g>
  ${extra(c.extra)}</svg>`;}

const COLORS={
  red:{fill:'#FFC1B7',ring:'#D94A39',deep:'#D94A39'},
  yellow:{fill:'#FFE08A',ring:'#E89A00',deep:'#E89A00'},
  blue:{fill:'#B5D9F6',ring:'#2F7FCB',deep:'#2F7FCB'},
  green:{fill:'#B3E6C7',ring:'#2E9A63',deep:'#2E9A63'}
};
const QUADS=[
 {key:'red',name:'빨간 마음',moods:[
   {n:'화난',eyes:'angry',mouth:'frown',extra:['anger'],sit:'친구가 내 물건을 말도 없이 가져가 돌려주지 않을 때',tip:'잠깐 멈추고 숨을 길게 세 번 내쉬어 봐요.'},
   {n:'충격받은',eyes:'wide',mouth:'open',extra:['sweat'],sit:'전혀 예상 못 한 깜짝 소식을 들었을 때',tip:'잠깐 멈추고 마음을 가다듬어 봐요.'},
   {n:'짜증나는',eyes:'angry',mouth:'wavy',extra:[],sit:'똑같은 문제를 풀어도 자꾸 틀릴 때',tip:'잠시 다른 일을 하며 마음을 식혀 봐요.'},
   {n:'스트레스 받는',eyes:'worry',mouth:'neutral',extra:['sweat'],sit:'해야 할 일이 한꺼번에 너무 많을 때',tip:'하나씩 차례대로 해보면 한결 나아져요.'},
   {n:'긴장한',eyes:'worry',mouth:'wavy',extra:['sweat'],sit:'친구들 앞에서 발표하기 바로 전일 때',tip:'"나는 할 수 있어"라고 마음속으로 말해 봐요.'},
   {n:'초조한',eyes:'worry',mouth:'wavy',extra:[],sit:'시간이 얼마 안 남아 마음이 급해질 때',tip:'마음속으로 천천히 숫자를 세어 봐요.'},
   {n:'겁먹은',eyes:'worry',mouth:'small',extra:['sweat'],sit:'깜깜한 방에 혼자 들어가야 할 때',tip:'무서울 땐 믿는 어른 곁으로 가도 괜찮아요.'},
   {n:'불안한',eyes:'worry',mouth:'small',extra:[],sit:'결과가 어떻게 될지 몰라 마음이 콩닥거릴 때',tip:'걱정을 한 가지씩 말로 꺼내면 가벼워져요.'},
   {n:'마음이 불편한',eyes:'worry',mouth:'neutral',extra:[],sit:'친구와 다툰 뒤 사이가 어색할 때',tip:'솔직하게 마음을 이야기해 보면 편해져요.'}
 ]},
 {key:'yellow',name:'노란 마음',moods:[

   {n:'놀란',eyes:'wide',mouth:'open',extra:['sparkle'],sit:'생각지도 못한 좋은 일이 생겼을 때',tip:'기쁜 놀라움을 친구에게 이야기해 봐요!'},
   {n:'들뜬',eyes:'wide',mouth:'open',extra:[],sit:'내일 놀러 갈 생각에 잠이 안 올 때',tip:'설레는 마음 그대로 즐겨도 좋아요.'},
   {n:'활발한',eyes:'wide',mouth:'bigSmile',extra:['sparkle'],sit:'운동장에서 신나게 뛰어다닐 때',tip:'넘치는 기운으로 즐겁게 움직여요!'},
   {n:'행복한',eyes:'happy',mouth:'bigSmile',extra:['blush'],sit:'가족과 맛있는 걸 먹으며 함께 웃을 때',tip:'무엇이 행복하게 했는지 기억해 둬요.'},
   {n:'기쁜',eyes:'happy',mouth:'smile',extra:[],sit:'갖고 싶던 선물을 받았을 때',tip:'기쁜 마음을 가족에게도 전해 봐요.'},
   {n:'자랑스러운',eyes:'happy',mouth:'grin',extra:['sparkle'],sit:'열심히 연습한 걸 드디어 해냈을 때',tip:'스스로에게 "참 잘했어!"라고 말해 줘요.'},
   {n:'재미있는',eyes:'happy',mouth:'grin',extra:[],sit:'친구들과 즐거운 놀이에 푹 빠졌을 때',tip:'이 재미를 마음껏 즐겨 봐요!'},
   {n:'희망찬',eyes:'happy',mouth:'smile',extra:['sparkle'],sit:'내일은 더 좋아질 거라는 기대가 들 때',tip:'그 좋은 기대를 마음에 품어 봐요.'}
 ]},
 {key:'blue',name:'파란 마음',moods:[
   {n:'슬픈',eyes:'sad',mouth:'frown',extra:['tear'],sit:'아끼던 물건을 잃어버렸을 때',tip:'슬플 땐 울어도 괜찮아요. 곁에 기대 봐요.'},
   {n:'우울한',eyes:'sad',mouth:'neutral',extra:[],sit:'이유 없이 마음이 가라앉고 흐릴 때',tip:'햇볕을 쬐거나 좋아하는 걸 해봐요.'},
   {n:'시무룩한',eyes:'sad',mouth:'small',extra:[],sit:'원하는 걸 못 하게 돼서 뾰로통해질 때',tip:'왜 속상한지 천천히 말해 봐요.'},
   {n:'기죽은',eyes:'sad',mouth:'frown',extra:[],sit:'잘 못한다는 말을 듣고 풀이 죽었을 때',tip:'누구나 처음엔 어려워요. 괜찮아요.'},
   {n:'실망스러운',eyes:'sad',mouth:'wavy',extra:[],sit:'기대한 일이 생각만큼 잘 안 됐을 때',tip:'다음엔 더 잘할 수 있어요. 괜찮아요.'},
   {n:'쓸쓸한',eyes:'sad',mouth:'small',extra:[],sit:'쉬는 시간에 같이 놀 친구가 없을 때',tip:'먼저 "같이 놀래?" 하고 다가가 봐요.'},
   {n:'지루한',eyes:'dot',mouth:'neutral',extra:[],sit:'할 일이 없어 시간이 안 갈 때',tip:'새로운 놀이나 책을 한번 찾아볼까요?'},
   {n:'피곤한',eyes:'sleepy',mouth:'neutral',extra:['zzz'],sit:'하루 종일 뛰어놀아 몸에 힘이 없을 때',tip:'잠깐 눈을 감고 푹 쉬어 가도 돼요.'},
   {n:'지친',eyes:'sleepy',mouth:'frown',extra:['zzz'],sit:'오래 공부하거나 일해서 기운이 다 빠졌을 때',tip:'잠시 멈추고 깊게 숨 쉬며 쉬어요.'}

 {key:'green',name:'초록 마음',moods:[

   {n:'안전한',eyes:'happy',mouth:'smile',extra:[],sit:'가족 곁에서 마음이 든든할 때',tip:'그 든든한 마음을 마음껏 누려요.'},

   {n:'다정한',eyes:'happy',mouth:'smile',extra:['blush'],sit:'친구와 사이좋게 어깨동무하고 걸을 때',tip:'그 따뜻한 마음을 친구에게도 나눠 줘요.'},
   {n:'감동적인',eyes:'happy',mouth:'smile',extra:['heart'],sit:'따뜻한 이야기에 마음이 뭉클해질 때',tip:'그 따뜻한 마음을 기억해 둬요.'}
 ]}
];
const ORDER=['red','yellow','blue','green'];

const meter=document.getElementById('meter');
ORDER.forEach(k=>{
  const q=QUADS.find(x=>x.key===k);const col=COLORS[k];
  const div=document.createElement('div');div.className='quad '+k;
  div.innerHTML=`<div class="quad-name"><span class="dot"></span>${q.name}</div><div class="cells"></div>`;
  const cells=div.querySelector('.cells');
  q.moods.forEach(m=>{
    const btn=document.createElement('button');btn.className='cell';
    btn.innerHTML=`${face({fill:col.fill,ring:col.ring,eyes:m.eyes,mouth:m.mouth,extra:m.extra})}<span class="lbl">${m.n}</span>`;
    btn.addEventListener('click',()=>select(k,m,btn));
    cells.appendChild(btn);
  });
  meter.appendChild(div);
});

const slot=document.getElementById('slot');
const chipsEl=document.getElementById('chips');
let picks=[];
function select(k,m,btn){
  document.querySelectorAll('.cell.sel').forEach(c=>c.classList.remove('sel'));
  btn.classList.add('sel');const col=COLORS[k];
  slot.innerHTML=`<div class="response" style="border-color:${col.ring}44">
     <div class="bigface">${face({fill:col.fill,ring:col.ring,eyes:m.eyes,mouth:m.mouth,extra:m.extra})}</div>
     <div class="feeling">지금 너의 마음은 <b style="color:${col.deep}">${m.n}</b> 마음이구나!</div>
     <div class="sit"><span>🔍</span><span>이럴 때 느낄 수 있어요 — ${m.sit}</span></div>
     <div class="tip"><span>💡</span><span>${m.tip}</span></div>
   </div>`;
  requestAnimationFrame(()=>slot.querySelector('.response').classList.add('show'));
  picks.push({k,m});renderChips();
}
function renderChips(){
  if(!picks.length){chipsEl.innerHTML='<span class="empty">아직 고른 마음이 없어요</span>';return;}
  chipsEl.innerHTML='';
  picks.slice(-16).forEach(p=>{const col=COLORS[p.k];
    const c=document.createElement('span');c.className='chip';
    c.innerHTML=`${face({fill:col.fill,ring:col.ring,eyes:p.m.eyes,mouth:p.m.mouth,extra:[]})}<span style="color:${col.deep}">${p.m.n}</span>`;
    chipsEl.appendChild(c);});
}
document.getElementById('clearBtn').addEventListener('click',()=>{picks=[];renderChips();});
</script>
